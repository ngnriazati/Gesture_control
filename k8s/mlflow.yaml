apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels: { app: mlflow }
  template:
    metadata:
      labels: { app: mlflow }
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:latest
          command: ["mlflow","server"]
          args: ["--backend-store-uri","sqlite:///mlflow.db",
                 "--default-artifact-root","file:/mlruns",
                 "--host","0.0.0.0","--port","5000"]
          ports: [{ containerPort: 5000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
spec:
  type: NodePort
  selector: { app: mlflow }
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001

